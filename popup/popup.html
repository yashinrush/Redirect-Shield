<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirect Shield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-container">
        <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span class="app-name">Redirect Shield</span>
      </div>
      <button id="open-settings-btn" class="icon-button" title="Open Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Main Power Toggle Section -->
    <section class="power-section">
      <button id="power-toggle-btn" class="power-button">
        <div class="power-glow"></div>
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </button>
      <div id="protection-status-label" class="protection-status">Shield Active</div>
      <div id="protection-level-badge" class="level-badge">High Protection</div>
    </section>

    <!-- Current Tab Details Card -->
    <section class="tab-card glass-card">
      <div class="tab-info">
        <div class="tab-domain-row">
          <span class="label">Current Site</span>
          <span id="current-domain" class="value">loading...</span>
        </div>
        <div class="tab-status-row">
          <span class="label">Status</span>
          <span id="site-status" class="status-indicator protected">
            <span class="indicator-dot"></span>
            Protected
          </span>
        </div>
      </div>
      <div class="tab-actions">
        <button id="whitelist-site-btn" class="action-btn outline">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Whitelist Site
        </button>
        <button id="blacklist-site-btn" class="action-btn outline danger">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          Blacklist Site
        </button>
      </div>
    </section>

    <!-- Stats Grid -->
    <section class="stats-section">
      <h3 class="section-title">Blocked Events</h3>
      <div class="stats-grid">
        <div class="stat-card glass-card">
          <span class="stat-value animated" id="stat-today">0</span>
          <span class="stat-label">Today</span>
        </div>
        <div class="stat-card glass-card">
          <span class="stat-value animated" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-card glass-card">
          <span class="stat-value animated" id="stat-popups">0</span>
          <span class="stat-label">Popups</span>
        </div>
        <div class="stat-card glass-card">
          <span class="stat-value animated" id="stat-overlays">0</span>
          <span class="stat-label">Overlays</span>
        </div>
      </div>
    </section>

    <!-- Quick Options -->
    <footer class="app-footer">
      <button id="reset-stats-btn" class="footer-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
        </svg>
        Reset Stats
      </button>
      <button id="dashboard-btn" class="footer-btn primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>

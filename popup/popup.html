<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexShield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Animated Aurora Gradient Background -->
  <div class="aurora-container">
    <div class="aurora-bubble bubble-1"></div>
    <div class="aurora-bubble bubble-2"></div>
    <div class="aurora-bubble bubble-3"></div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-container">
        <img src="../icons/neximg.png" class="logo-img" alt="NexShield Logo">
        <span class="app-name">NexShield</span>
      </div>
      <div class="header-actions">
        <button id="theme-toggle-btn" class="icon-button" title="Toggle Theme">
          <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button id="open-settings-btn" class="icon-button" title="Open Settings Dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Global Shield Action Switch -->
    <section class="power-section">
      <div class="power-outer-ring"></div>
      <button id="power-toggle-btn" class="power-button">
        <div class="power-glow"></div>
        <svg class="power-icon-svg" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </button>
      <div id="protection-status-label" class="protection-status">Shield Active</div>
      <div id="protection-level-badge" class="level-badge">Balanced Mode</div>
    </section>

    <!-- Active Tab Reputation & Details Card -->
    <section class="tab-card glass-card">
      <div class="tab-info">
        <div class="tab-domain-row">
          <span class="label">Current Site</span>
          <span id="current-domain" class="value">Loading page...</span>
        </div>
        <div class="tab-status-row">
          <span class="label">Reputation</span>
          <span id="site-reputation" class="status-indicator protected">
            <span class="indicator-dot"></span>
            Safe Domain
          </span>
        </div>
        <div class="tab-level-row">
          <span class="label">Site Shield</span>
          <select id="site-level-select" class="site-level-dropdown">
            <option value="default">Global Default</option>
            <option value="basic">Basic Protection</option>
            <option value="balanced">Balanced Mode</option>
            <option value="advanced">Advanced Shield</option>
            <option value="maximum">Strict Shield</option>
          </select>
        </div>
      </div>
      <div class="tab-actions">
        <button id="whitelist-site-btn" class="action-btn outline">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Whitelist Site
        </button>
        <button id="blacklist-site-btn" class="action-btn outline danger">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          Blacklist Site
        </button>
      </div>
    </section>

    <!-- Active Rules Checklist -->
    <section class="checklist-section glass-card">
      <h3 class="section-title">Shield Features</h3>
      <div class="checklist-grid">
        <div class="check-item" id="chk-popups">
          <span class="chk-indicator"></span>
          <span class="chk-label">Popup Blocker</span>
        </div>
        <div class="check-item" id="chk-redirects">
          <span class="chk-indicator"></span>
          <span class="chk-label">Redirect Shield</span>
        </div>
        <div class="check-item" id="chk-overlays">
          <span class="chk-indicator"></span>
          <span class="chk-label">Overlay Cleaner</span>
        </div>
        <div class="check-item" id="chk-deceptive">
          <span class="chk-indicator"></span>
          <span class="chk-label">Deceptive Finder</span>
        </div>
      </div>
      <button id="zap-overlays-btn" class="zap-btn" title="Zap overlays manually">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Zap Overlays Manually
      </button>
    </section>

    <!-- Real-time Stats Grid -->
    <section class="stats-section">
      <h3 class="section-title">Threat Indicators</h3>
      <div class="stats-grid">
        <div class="stat-card glass-card">
          <span class="stat-value animated" id="stat-today">0</span>
          <span class="stat-label">Today's Blocks</span>
        </div>
        <div class="stat-card glass-card">
          <span class="stat-value animated" id="stat-total">0</span>
          <span class="stat-label">Lifetime Total</span>
        </div>
        <div class="stat-card glass-card">
          <span class="stat-value animated" id="stat-popups">0</span>
          <span class="stat-label">Popups</span>
        </div>
        <div class="stat-card glass-card">
          <span class="stat-value animated" id="stat-redirects">0</span>
          <span class="stat-label">Redirects</span>
        </div>
        <div class="stat-card glass-card">
          <span class="stat-value animated" id="stat-overlays">0</span>
          <span class="stat-label">Overlays</span>
        </div>
        <div class="stat-card glass-card">
          <span class="stat-value animated" id="stat-deceptive">0</span>
          <span class="stat-label">Deceptive</span>
        </div>
      </div>
    </section>

    <!-- Live Activity Log -->
    <section class="activity-section glass-card" id="activity-card" style="display: none;">
      <h3 class="section-title">Live Activity Log</h3>
      <div id="activity-log-list" class="activity-list">
        <!-- Live blocks will slide in here -->
      </div>
    </section>

    <!-- Footer Commands -->
    <footer class="app-footer">
      <button id="reset-stats-btn" class="footer-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
        </svg>
        Reset Metrics
      </button>
      <button id="dashboard-btn" class="footer-btn primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </button>
    </footer>
  </div>

  <script src="../utils/logger.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="../utils/helpers.js"></script>
  <script src="../utils/rules.js"></script>
  <script src="../utils/detector.js"></script>
  <script src="popup.js"></script>
</body>
</html>
